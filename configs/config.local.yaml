logger:
  level: "debug"

server:
  port: 8080

mongo:
  host: "mongo"
  port: 27017
  database: "product-query"
  replica-set: rs0
  migrations:
    enabled: true
    auto-migrate: true

kafka:
  brokers: "kafka:29092"
  consumers-config:
    group-id: "ecommerce-product-query-service"
    auto-offset-reset: "earliest"
    consumers:
      - name: "product-events"
        topic: "catalog.product.events"

observability:
  tracing-enabled: true
  metrics-enabled: false
  metrics-interval: 10s
  otel-collector-endpoint: "otel-collector-opentelemetry-collector.observability.svc:4317"
