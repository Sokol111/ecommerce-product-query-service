logger:
  level: "debug"
  development: true

server:
  port: 8080

mongo:
  host: "mongo"
  port: 27017
  database: "product-query"
  replica-set: rs0

kafka:
  brokers: "redpanda:29092"
  schema-registry:
    url: "http://redpanda:8081"
    auto-register-schemas: true
  consumers-config:
    default-group-id: "ecommerce-product-query-service"
    default-auto-offset-reset: "earliest"
    consumers:
      - name: "catalog-events"
        topic: "catalog.product.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true
      - name: "catalog-attribute-events"
        topic: "catalog.attribute.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true
      - name: "tenant-events"
        topic: "tenant.tenant.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true

security:
  token:
    public-key: "eb6ebefd6a2b0a304d43c2ccca329aef0a1439d429dbe8ca9b6190622ce38341"
    service-token: "v4.public._yNr1at2KTXCI8oIiwEjJVwixiv3FjFMlW1WZrg0uNK451IOEBclg6kQTw2DvD0sJK1XQi_TYYHNUi7tQw"

observability:
  otel-collector-endpoint: "otel-collector-opentelemetry-collector.observability.svc:4317"
  tracing:
    enabled: true
  metrics:
    enabled: false

pprof:
  enabled: true
  port: 6060

clients:
  tenant-service:
    base-url: "http://ecommerce-tenant-service:8080"
