# =============================================================================
# Product Query Service - Production Configuration
# =============================================================================
# Values can be overridden by environment variables.
# Viper automatically maps: mongo.host -> MONGO_HOST, kafka.brokers -> KAFKA_BROKERS, etc.

mongo:
  host: ""
  username: ""
  password: ""
  database: product-query
  replica-set: ""

security:
  token:
    public-key: ""

kafka:
  brokers: "redpanda:29092"
  schema-registry:
    url: "http://redpanda:8081"
    auto-register-schemas: true
  consumers-config:
    default-group-id: "ecommerce-product-query-service"
    default-auto-offset-reset: "earliest"
    consumers:
      - name: "catalog-events"
        topic: "catalog.product.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true
      - name: "catalog-attribute-events"
        topic: "catalog.attribute.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true

observability:
  otel-collector-endpoint: ""
  tracing:
    enabled: true
  metrics:
    enabled: true
