logger:
  level: "debug"

server:
  port: 8080

mongo:
  host: "mongo"
  port: 27017
  database: "product-query"
  replica-set: rs0

kafka:
  brokers: "kafka:29092"
  consumers-config:
    group-id: "ecommerce-product-query-service"
    auto-offset-reset: "earliest"
    consumers:
      - handler: "productCreatedHandler"
        topic: "catalog.product.created.v1"
      - handler: "productUpdatedHandler"
        topic: "catalog.product.updated.v1"

observability:
  tracing-enabled: true
  otel-collector-endpoint: "otelcol.observability.svc:4317"